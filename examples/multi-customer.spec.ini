# multi-customer.spec.ini
#
# Demonstrates the case awsconfd exists for: a personal organisation plus
# two client organisations, each with its own sso-session, sharing nothing
# but the tool that assembles them. Adding a third client is one more
# sso-session block, one more profile block, and (optionally) one more
# scheme.conf range - never a merge conflict with the other two.
#
# Try it:
#   awsconfd apply --spec examples/multi-customer.spec.ini

[awsconfd]
version = 1
strict  = false

[awsconfd:scheme]
00    = defaults
10    = sso-sessions
2x    = personal
30-39 = customer-a
40-49 = customer-b

[awsconfd:layout]
default                  = 00-defaults.conf
sso-session personal     = 10-sso.conf
sso-session customer-a   = 10-sso.conf
sso-session customer-b   = 10-sso.conf
profile personal-admin   = 20-personal-admin.conf
profile customer-a-audit = 30-customer-a-audit.conf
profile customer-b-audit = 40-customer-b-audit.conf

[default]
output = json

[sso-session personal]
sso_start_url = https://d-1234567890.awsapps.com/start
sso_region    = eu-west-2
sso_registration_scopes = sso:account:access

[sso-session customer-a]
sso_start_url = https://d-abcdef0123.awsapps.com/start
sso_region    = us-east-1
sso_registration_scopes = sso:account:access

[sso-session customer-b]
sso_start_url = https://d-fedcba9876.awsapps.com/start
sso_region    = eu-central-1
sso_registration_scopes = sso:account:access

[profile personal-admin]
sso_session    = personal
sso_account_id = 111122223333
sso_role_name  = AdministratorAccess
region         = eu-west-2

[profile customer-a-audit]
sso_session    = customer-a
sso_account_id = 444455556666
sso_role_name  = SecurityAudit
region         = us-east-1

[profile customer-b-audit]
sso_session    = customer-b
sso_account_id = 777788889999
sso_role_name  = SecurityAudit
region         = eu-central-1
