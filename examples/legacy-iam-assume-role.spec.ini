# legacy-iam-assume-role.spec.ini
#
# Demonstrates a non-SSO assume-role profile whose source_profile lives only
# in ~/.aws/credentials. Useful for older estates that still root access in
# static IAM credentials or external tooling that writes that file.
#
# Requires a matching shared-credentials entry such as:
#   [legacy-admin]
#   aws_access_key_id = ...
#   aws_secret_access_key = ...
#
# Try it:
#   awsconfd apply --spec examples/legacy-iam-assume-role.spec.ini

[awsconfd]
version = 1
strict  = false

[awsconfd:scheme]
00    = defaults
50-59 = assumed-roles

[awsconfd:layout]
default            = 00-defaults.conf
profile audit-role = 50-audit-role.conf

[default]
output = json

[profile audit-role]
role_arn         = arn:aws:iam::444455556666:role/SecurityAudit
source_profile   = legacy-admin
mfa_serial       = arn:aws:iam::111122223333:mfa/graham
duration_seconds = 3600
region           = eu-west-2