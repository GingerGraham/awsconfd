# assume-role.spec.ini
#
# Demonstrates cross-account role assumption via source_profile, the
# non-SSO path: an SSO-backed "hub" profile that credential_process/
# source_profile chains assume a role from. Useful when a target account
# isn't itself SSO-enrolled, or when a role has to be assumed with an MFA
# condition attached.
#
# Try it:
#   awsconfd apply --spec examples/assume-role.spec.ini

[awsconfd]
version = 1
strict  = false

[awsconfd:scheme]
00    = defaults
10    = sso-sessions
2x    = personal
50-59 = assumed-roles

[awsconfd:layout]
default                = 00-defaults.conf
sso-session personal   = 10-sso.conf
profile personal-admin = 20-personal-admin.conf
profile audit-role     = 50-audit-role.conf

[default]
output = json

[sso-session personal]
sso_start_url = https://d-1234567890.awsapps.com/start
sso_region    = eu-west-2
sso_registration_scopes = sso:account:access

[profile personal-admin]
sso_session    = personal
sso_account_id = 111122223333
sso_role_name  = AdministratorAccess
region         = eu-west-2

[profile audit-role]
role_arn         = arn:aws:iam::444455556666:role/SecurityAudit
source_profile   = personal-admin
mfa_serial       = arn:aws:iam::111122223333:mfa/graham
duration_seconds = 3600
region           = us-east-1
