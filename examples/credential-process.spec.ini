# credential-process.spec.ini
#
# Demonstrates a non-SSO profile that obtains credentials from an external
# command implementing the AWS CLI credential_process contract.
#
# The command must print the standard JSON payload to stdout at runtime; this
# example only manages the config shape, not the command implementation.
#
# Try it:
#   awsconfd apply --spec examples/credential-process.spec.ini

[awsconfd]
version = 1
strict  = false

[awsconfd:scheme]
000     = defaults
600-609 = external-process

[awsconfd:layout]
default                  = 000-defaults.conf
profile external-audit   = 600-external-audit.conf

[default]
output = json

[profile external-audit]
credential_process = /usr/local/bin/example-idp credential-process --profile external-audit
region             = eu-west-2
