# single-org.spec.ini
#
# Demonstrates the simplest realistic setup: one personal AWS organisation
# with SSO, one admin profile and one read-only profile against it.
#
# Try it:
#   awsconfd apply --spec examples/single-org.spec.ini

[awsconfd]
version = 1
strict  = false

[awsconfd:scheme]
00 = defaults
10 = sso-sessions
2x = personal

[awsconfd:layout]
default                = 00-defaults.conf
sso-session personal   = 10-sso.conf
profile personal-admin = 20-personal-admin.conf
profile personal-ro    = 21-personal-readonly.conf

[default]
output = json

[sso-session personal]
sso_start_url           = https://d-1234567890.awsapps.com/start
sso_region              = eu-west-2
sso_registration_scopes = sso:account:access

[profile personal-admin]
sso_session    = personal
sso_account_id = 111122223333
sso_role_name  = AdministratorAccess
region         = eu-west-2

[profile personal-ro]
sso_session    = personal
sso_account_id = 111122223333
sso_role_name  = ReadOnlyAccess
region         = eu-west-2
